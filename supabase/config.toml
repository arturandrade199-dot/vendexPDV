# O app desktop chama essas functions direto (email+fingerprint validados na lógica de
# cada uma, contra a tabela licencas_assinatura ou relatorios_problema) — sem usuário do
# Supabase Auth envolvido, então verify_jwt precisa ficar desligado nas 4, senão o gateway
# do Supabase exige um JWT válido antes até de a function rodar.

[functions.hotmart-webhook]
verify_jwt = false

[functions.ativar-licenca]
verify_jwt = false

[functions.verificar-licenca]
verify_jwt = false

[functions.reportar-problema]
verify_jwt = false

[functions.verificar-atualizacao]
verify_jwt = false
